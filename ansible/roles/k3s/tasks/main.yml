- name: Download k3s installation script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s_install.sh
    mode: '0755'
  become: true

- name: Install k3s (server mode, single node)
  shell: /tmp/k3s_install.sh
  args:
    creates: /usr/local/bin/k3s
  become: true

- name: Wait for k3s service to be active
  wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    state: present
    timeout: 60
  become: true

- name: Allow Kubernetes API port through UFW
  ufw:
    rule: allow
    port: 6443
    proto: tcp
  become: true

- name: Fetch kubeconfig file to control machine
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ./kubeconfig-k3s.yaml
    flat: yes
  become: true